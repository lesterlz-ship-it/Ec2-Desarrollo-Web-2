server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:orders_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  sql:
    init:
      mode: always
      data-locations: classpath:db/data.sql
      continue-on-error: true

# Configuración del cliente Feign hacia user-service
user-service:
  url: ${USER_SERVICE_URL:http://user-service:8081}
  name: user-service

# Configuración global de Feign
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: BASIC
      user-service:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: BASIC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    root: INFO
    com.demo.orderservice: DEBUG
    org.hibernate.SQL: INFO
